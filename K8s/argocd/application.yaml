apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: robo-shop
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/YOUR_GITHUB_USERNAME/robo-shop.git'
    targetRevision: main
    path: K8s/manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
