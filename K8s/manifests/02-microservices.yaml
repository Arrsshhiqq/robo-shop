apiVersion: apps/v1
kind: Deployment
metadata:
  name: ratings
  labels:
    app: ratings
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ratings
  template:
    metadata:
      labels:
        app: ratings
    spec:
      containers:
      - name: ratings
        image: ghcr.io/arrsshhiqq/rs-ratings:latest
        env:
        - name: APP_ENV
          value: prod
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ratings
  labels:
    app: ratings
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: ratings
