---
- name: Setup MicroK8s on EC2
  hosts: all
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install snapd
      apt:
        name: snapd
        state: present

    - name: Install MicroK8s via snap
      snap:
        name: microk8s
        classic: yes
        channel: 1.30/stable

    - name: Ensure microk8s group exists
      group:
        name: microk8s
        state: present

    - name: Add ubuntu user to microk8s group
      user:
        name: ubuntu
        groups: microk8s
        append: yes

    - name: Wait for MicroK8s to be ready
      command: microk8s status --wait-ready
      changed_when: false
      retries: 10
      delay: 15
      register: result
      until: result.rc == 0

    - name: Enable MicroK8s addons (dns, hostpath-storage, ingress, registry)
      command: microk8s enable dns hostpath-storage ingress registry
      changed_when: false

    - name: Create .kube directory for ubuntu user
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0700'

    - name: Export MicroK8s config to kubeconfig
      shell: microk8s config > /home/ubuntu/.kube/config
      changed_when: false

    - name: Set permissions on kubeconfig
      file:
        path: /home/ubuntu/.kube/config
        owner: ubuntu
        group: ubuntu
        mode: '0600'

    - name: Alias kubectl to microk8s kubectl
      lineinfile:
        path: /home/ubuntu/.bashrc
        line: 'alias kubectl="microk8s kubectl"'
        create: yes
        owner: ubuntu
